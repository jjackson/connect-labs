# flake8 and pycodestyle don't support pyproject.toml
# https://github.com/PyCQA/flake8/issues/234
# https://github.com/PyCQA/pycodestyle/issues/813
[flake8]
max-line-length = 119
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,.venv
extend-ignore = E203
per-file-ignores =
    # These files contain JSX templates as Python strings which have long lines
    commcare_connect/workflow/templates.py:E501
    commcare_connect/workflow/templates/*.py:E501
    commcare_connect/ai/agents/workflow_agent.py:E501
    commcare_connect/ai/agents/pipeline_agent.py:E501
    # Dead test command (returns early, dead code references removed view)
    commcare_connect/audit/management/commands/test_labs_record_local.py:F821
    # Standalone test files with inline django.setup() need E402
    commcare_connect/workflow/tests/test_mbw_v1_v2_parity.py:E402
    commcare_connect/labs/tests/test_cchq_pipeline.py:E402

[pycodestyle]
max-line-length = 119
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,.venv
