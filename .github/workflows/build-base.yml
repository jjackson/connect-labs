name: Build Base Image

on:
  push:
    branches: [main]
    paths:
      - 'requirements/*.txt'
      - 'requirements/*.in'
      - 'Dockerfile.base'
      - 'docker/*'

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: labs-jj-commcare-connect
  ECR_REGISTRY: 858923557655.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-base:
    name: Build & Push Base Image
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute requirements hash
        id: req-hash
        run: |
          HASH=$(cat requirements/base.txt | sha256sum | cut -c1-12)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:base-latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:base-${{ steps.req-hash.outputs.hash }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:cache-base
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:cache-base,mode=max
